version: '3.8'

services:
  wxauto-onebot:
    build: .
    container_name: wxauto-onebot
    restart: unless-stopped
    ports:
      - "10001:10001"
    volumes:
      - ./config:/app/config
      - ./cache:/app/cache
      - ./logs:/app/logs
    environment:
      - TZ=Asia/Shanghai
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:10001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
